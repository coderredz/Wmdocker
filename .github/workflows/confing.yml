name: Radare2 + Ngrok Tunnel

on:
  workflow_dispatch:
    inputs:
      binary_path:
        description: 'Путь к бинарному файлу в репозитории'
        required: true
        default: 'files/libtarget.so'
        type: string
      binary_url:
        description: 'Или URL для скачивания бинарника'
        required: false
        default: ''
        type: string

jobs:
  tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install radare2
        run: |
          sudo apt update
          sudo apt install -y radare2
          r2 -v

      - name: Install ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          sudo mv ngrok /usr/local/bin/

      - name: Set up ngrok auth
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: ngrok config add-authtoken $NGROK_AUTH_TOKEN

      - name: Download or use binary
        run: |
          if [ -n "${{ inputs.binary_url }}" ]; then
            echo "Скачиваю с URL: ${{ inputs.binary_url }}"
            wget -O target_binary "${{ inputs.binary_url }}"
            chmod +x target_binary
            BINARY_PATH="target_binary"
          else
            BINARY_PATH="${{ inputs.binary_path }}"
          fi
          
          if [ ! -f "$BINARY_PATH" ]; then
            echo "Файл $BINARY_PATH не найден!"
            exit 1
          fi
          
          echo "BINARY=$BINARY_PATH" >> $GITHUB_ENV
          ls -la "$BINARY_PATH"

      - name: Start radare2 server
        run: |
          echo "Запускаю r2 сервер на файле: $BINARY"
          r2 -c "=H 9090" -q "$BINARY" &
          R2_PID=$!
          echo "R2_PID=$R2_PID" >> $GITHUB_ENV
          sleep 3
          netstat -tlnp 2>/dev/null | grep 9090 || ss -tlnp | grep 9090

      - name: Start ngrok tunnel
        run: |
          ngrok tcp 9090 --log=stdout > ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "NGROK_PID=$NGROK_PID" >> $GITHUB_ENV
          sleep 5
          
          # Извлекаем адрес туннеля
          TUNNEL_URL=$(cat ngrok.log | grep -o 'tcp://[0-9a-z.-]*:[0-9]*' | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "========================================="
          echo "🔌 ПОДКЛЮЧАЙСЯ: $TUNNEL_URL"
          echo "========================================="
          echo "Команда: r2 $TUNNEL_URL"
          echo "Или: r2 rap://$(echo $TUNNEL_URL | cut -d'/' -f3)"
          echo "========================================="

      - name: Keep tunnel alive
        run: |
          echo "Туннель активен. Нажми Ctrl+C для остановки."
          echo "URL: $TUNNEL_URL"
          while true; do
            # Проверяем процессы каждые 30 секунд
            if ! kill -0 $R2_PID 2>/dev/null; then
              echo "⚠️ r2 сервер упал, перезапускаем..."
              r2 -c "=H 9090" -q "$BINARY" &
              R2_PID=$!
            fi
            if ! kill -0 $NGROK_PID 2>/dev/null; then
              echo "⚠️ ngrok упал, перезапускаем..."
              ngrok tcp 9090 --log=stdout > ngrok.log 2>&1 &
              NGROK_PID=$!
            fi
            sleep 30
          done
