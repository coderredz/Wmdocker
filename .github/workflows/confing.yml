name: Radare2 + Cloudflared Tunnel

on:
  workflow_dispatch:
    inputs:
      binary_path:
        description: 'Путь к бинарному файлу в репозитории'
        required: true
        default: 'files/libtarget.so'
        type: string
      binary_url:
        description: 'Или URL для скачивания бинарника'
        required: false
        default: ''
        type: string

jobs:
  tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install radare2
        run: |
          sudo apt update
          sudo apt install -y radare2
          r2 -v

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Download or use binary
        run: |
          if [ -n "${{ inputs.binary_url }}" ]; then
            echo "Скачиваю с URL: ${{ inputs.binary_url }}"
            wget -O target_binary "${{ inputs.binary_url }}"
            chmod +x target_binary
            BINARY_PATH="target_binary"
          else
            BINARY_PATH="${{ inputs.binary_path }}"
          fi
          
          if [ ! -f "$BINARY_PATH" ]; then
            echo "Файл $BINARY_PATH не найден!"
            exit 1
          fi
          
          echo "BINARY=$BINARY_PATH" >> $GITHUB_ENV
          ls -la "$BINARY_PATH"

      - name: Start radare2 server
        run: |
          echo "Запускаю r2 сервер на файле: $BINARY"
          r2 -c "=H 9090" -q "$BINARY" &
          R2_PID=$!
          echo "R2_PID=$R2_PID" >> $GITHUB_ENV
          sleep 3
          netstat -tlnp 2>/dev/null | grep 9090 || ss -tlnp | grep 9090

      - name: Start cloudflared tunnel
        run: |
          cloudflared tunnel --url tcp://localhost:9090 --logfile cloudflared.log &
          CLOUDFLARED_PID=$!
          echo "CLOUDFLARED_PID=$CLOUDFLARED_PID" >> $GITHUB_ENV
          sleep 5
          
          # Извлекаем URL туннеля
          TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "========================================="
          echo "🔌 ПОДКЛЮЧАЙСЯ ЧЕРЕЗ CLOUDFLARED:"
          echo "   r2 rap://$(echo $TUNNEL_URL | sed 's|https://||')?x"
          echo ""
          echo "ИЛИ вручную:"
          echo "   cloudflared access tcp --hostname $(echo $TUNNEL_URL | sed 's|https://||') --url localhost:1313"
          echo "   r2 rap://localhost:1313"
          echo "========================================="

      - name: Keep tunnel alive
        run: |
          echo "Туннель активен. Нажми Ctrl+C для остановки."
          echo "URL: $TUNNEL_URL"
          while true; do
            if ! kill -0 $R2_PID 2>/dev/null; then
              echo "⚠️ r2 сервер упал, перезапускаем..."
              r2 -c "=H 9090" -q "$BINARY" &
              R2_PID=$!
            fi
            if ! kill -0 $CLOUDFLARED_PID 2>/dev/null; then
              echo "⚠️ cloudflared упал, перезапускаем..."
              cloudflared tunnel --url tcp://localhost:9090 --logfile cloudflared.log &
              CLOUDFLARED_PID=$!
            fi
            sleep 30
          done
