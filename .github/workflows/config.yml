name: Radare2 + Bore Tunnel

on:
  workflow_dispatch:
    inputs:
      binary_path:
        description: 'Путь к бинарному файлу в репозитории'
        required: true
        default: 'files/libtarget.so'
        type: string
      binary_url:
        description: 'Или URL для скачивания бинарника'
        required: false
        default: ''
        type: string

jobs:
  tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install radare2
        run: |
          sudo apt update
          sudo apt install -y radare2
          r2 -v

      - name: Install bore
        run: |
          curl -L --output bore https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore
          sudo mv bore /usr/local/bin/
          bore --version || echo "bore installed"

      - name: Download or use binary
        run: |
          if [ -n "${{ inputs.binary_url }}" ]; then
            echo "Скачиваю с URL: ${{ inputs.binary_url }}"
            wget -O target_binary "${{ inputs.binary_url }}"
            chmod +x target_binary
            BINARY_PATH="target_binary"
          else
            BINARY_PATH="${{ inputs.binary_path }}"
          fi
          
          if [ ! -f "$BINARY_PATH" ]; then
            echo "Файл $BINARY_PATH не найден!"
            exit 1
          fi
          
          echo "BINARY=$BINARY_PATH" >> $GITHUB_ENV

      - name: Start radare2 server
        run: |
          r2 -c "=H 9090" -q "$BINARY" &
          echo "R2_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Start bore tunnel
        run: |
          bore local 9090 --to bore.pub &
          BORE_PID=$!
          echo "BORE_PID=$BORE_PID" >> $GITHUB_ENV
          sleep 5
          
          # bore не выводит URL в лог, получаем через вывод на stderr
          echo "========================================="
          echo "🔌 ПОДКЛЮЧАЙСЯ:"
          echo "   bore.pub:<рандомный_порт>"
          echo ""
          echo "Чтобы узнать порт — посмотри логи выше 👆"
          echo "Или выполни локально:"
          echo "   curl -s https://bore.pub/api/ports"
          echo "========================================="

      - name: Keep tunnel alive
        run: |
          echo "Туннель активен."
          while true; do sleep 30; done
